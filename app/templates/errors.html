<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ code }} - Buzón Ciudadano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="relative w-full max-w-lg">
        <div class="absolute inset-0 bg-blue-100 rounded-[3rem] blur-3xl opacity-30 -rotate-6"></div>
        <div class="relative bg-white/80 backdrop-blur-2xl border border-white p-12 rounded-[3rem] shadow-2xl shadow-slate-200/50 text-center">
            <div class="mb-6 inline-flex items-center justify-center w-24 h-24 bg-slate-900 text-white rounded-3xl text-4xl font-black shadow-xl">
                {{ code }}
            </div>
            <h2 class="text-3xl font-black text-slate-900 mb-4 tracking-tight">{{ error.name if error.name else 'Algo salió mal' }}</h2>
            <p class="text-slate-500 font-medium mb-10 leading-relaxed">{{ message }}</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="javascript:history.back()" class="px-8 py-4 bg-slate-100 text-slate-600 rounded-2xl text-sm font-bold hover:bg-slate-200 transition-all">
                    Regresar
                </a>
                <a href="/" class="px-8 py-4 bg-blue-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all transform hover:-translate-y-0.5">
                    Ir al Inicio
                </a>
            </div>
        </div>
    </div>
</body>
</html>
